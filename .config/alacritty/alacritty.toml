[general]
import = [
    "~/.config/alacritty/catppuccin-mocha.toml",
    "~/.config/alacritty/platform.toml",
]

[cursor.style]
blinking = "Off"
shape = "Block"

[env]
TERM = "xterm-256color"


[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = true

[window]
opacity = 1.0
option_as_alt = "Both"

[window.padding]
x = 10
y = 8

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001b\r"

# Fix Ctrl+/ not being sent correctly on macOS
# https://github.com/alacritty/alacritty/issues/3586
[[keyboard.bindings]]
key = "Slash"
mods = "Control"
chars = "\u001f"

