# Set colors
# https://github.com/neovim/neovim/wiki/FAQ#colors-arent-displayed-correctly
set -g default-terminal "xterm-256color"

# Fix colors
# https://stackoverflow.com/a/60313682/3112403
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Extended keys: forward modifier keys (e.g., Ctrl+/) correctly to apps like Neovim
# https://github.com/tmux/tmux/wiki/Modifier-Keys
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Enable OSC 52 clipboard (tmux copy-mode emits OSC 52, inner apps forwarded)
set -s set-clipboard on

# Change prefix key to C-a, easier to type, same to "screen"
unbind C-b
set -g prefix C-a

# increase time allowed to repeat commands
set -g repeat-time 1500 # default 500

# Enable mouse support
set -g mouse on

# fix delay in exiting insert mode in neovim
# https://github.com/neovim/neovim/wiki/FAQ#esc-in-tmux-or-gnu-screen-is-delayed
set -sg escape-time 10

# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g status-interval 5

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# Reload tmux config with Prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded tmux config"

# vi style keybindings
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# repeatable next/previous window (prefix + n, then n n n...)
bind -r n next-window
bind -r p previous-window

# bind "v" to enter visual mode, matching vim
bind -T copy-mode-vi v send -X begin-selection

# setup tmux vim-tmux-navigator
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# Mapping for clear screen, since vim-tmux-navigator hijacks the default C-L
bind C-l send-keys 'C-l'

# rebind vertical split windows (matches LazyVim <leader>|)
unbind %
bind | split-window -h -c "#{pane_current_path}"

# rebind horizontal split windows (matches LazyVim <leader>-)
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# rebind resizing panes to match neovim

# resize 5 rows up
unbind M-Up
bind-key -r -T prefix C-Up resize-pane -U 5

# resize 5 rows down
unbind M-Down
bind-key -r -T prefix C-Down resize-pane -D 5

# resize 5 rows right
unbind M-Right
bind-key -r -T prefix C-Right resize-pane -R 5

# resize 5 rows left
unbind M-Left
bind-key -r -T prefix C-Left resize-pane -L 5

# layout shortcuts
bind F1 select-layout even-horizontal
bind F2 select-layout even-vertical
bind F3 select-layout main-vertical

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'roosta/tmux-fuzzback'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'omerxx/tmux-sessionx'

# tmux-yank: stay in copy mode after yanking (matches previous copy-pipe behavior)
set -g @yank_action 'copy-pipe'

# tmux-fuzzback: fuzzy search scrollback buffer (prefix + ?)
set -g @fuzzback-popup 1
set -g @fuzzback-popup-size '90%'

# extrakto: extract tokens from scrollback (prefix + tab)
set -g @extrakto_split_direction 'p'
set -g @extrakto_popup_size '90%'

# sessionx: session manager (prefix + O)
set -g @sessionx-bind 'o'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-tmuxinator-mode 'on'
set -g @sessionx-preview-location 'right'
set -g @sessionx-preview-ratio '45%'
set -g @sessionx-filter-current 'false'
set -g @sessionx-git-branch 'on'
set -g @sessionx-tree-mode 'off'
set -g @sessionx-window-mode 'off'
set -g @sessionx-bind-kill-session 'alt-x'

# configure tmux-scout (Claude Code session monitor)
set -g @plugin 'qeesung/tmux-scout'

# configure catppuccin theme
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'
set -g automatic-rename-format '#{pane_title}'
set -g status-position top

# source catppuccin before setting status line (makes @catppuccin_status_* available)
run '~/.config/tmux/plugins/tmux/catppuccin.tmux'

# status line
set -g status-left ""
set -g status-right-length 100
set -g  status-right "#{?client_prefix,#[fg=#{@thm_peach}] ⚡#[default],}"
set -ag status-right '#{E:@catppuccin_status_session}'
set -agF status-right '#{E:@catppuccin_status_cpu}'

# load custom catppuccin module for tmux-scout
source -F "#{d:current_file}/scout-module.conf"
set -ag status-right '#{E:@catppuccin_status_scout}'
set -gu @mobile_mode

# enable pane titles
set -g pane-border-lines heavy
set-option -g pane-border-status top
set-option -g pane-border-format "#{pane_index}: #{pane_title}"

# auto renumber
set -g renumber-windows on

# Initialize TMUX plugin manager (must be after status line config so
# tmux-cpu can substitute #{cpu_percentage} in status-right)
run '~/.config/tmux/plugins/tpm/tpm'

# === F12 toggle for nested tmux sessions ===

# Toggle OFF: disable prefix, dim outer status bar, pass all keys to inner session
bind -T root F12 \
    set prefix None \;\
    set key-table off \;\
    set -g status-position bottom \;\
    set -g pane-border-status off \;\
    set -g status-style "bg=#313244,fg=#6c7086" \;\
    set -g status-left "" \;\
    set -g status-right " #S 🔒 " \;\
    set -g window-status-current-format " #W " \;\
    set -g window-status-format " #W " \;\
    if -F '#{pane_in_mode}' 'send-keys -X cancel'

# Toggle ON: restore Catppuccin theme by re-sourcing config
# NOTE: source-file must stay on the same line as the previous command.
# TPM's _sourced_files() uses a sed regex that matches any line starting with
# "source-file". If it's on its own line, TPM reads tmux.conf twice, causing
# every plugin to be updated in duplicate (racing git pulls → errors).
bind -T off F12 \
    set -u prefix \;\
    set -u key-table \; source-file ~/.config/tmux/tmux.conf

# === prefix + m: toggle mobile mode (simplified status, 📱 badge) ===
bind m if -F '#{@mobile_mode}' \
    'source-file ~/.config/tmux/tmux.conf' \
    'set -g @mobile_mode 1 ; set -g status-left " 📱 " ; set -g status-right "#{?client_prefix,#[fg=#{@thm_peach}] ⚡#[default],}"'
